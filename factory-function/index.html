<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
    />

    <title>Calculadora</title>
  </head>
  <body>
    <section class="container">
      <h1>Calculadora</h1>
      <div class="wrapper">
        <div class="output">
          <div class="previous-operand">3454 +</div>
          <div class="current-operand">43</div>
        </div>
        <div class="controls">
          <button class="btn teal btn-clear">AC</button>
          <button class="btn teal btn-del">&laquo;</button>
          <button class="btn teal div">÷</button>
          <button class="btn teal btn-tim">*</button>
          <button class="btn btn-num">7</button>
          <button class="btn btn-num">8</button>
          <button class="btn btn-num">9</button>
          <button class="btn teal btn-min">-</button>
          <button class="btn btn-num">4</button>
          <button class="btn btn-num">5</button>
          <button class="btn btn-num">6</button>
          <button class="btn teal btn-sum">+</button>
          <button class="btn btn-num">1</button>
          <button class="btn btn-num">2</button>
          <button class="btn btn-num">3</button>
          <button class="btn btn-num">0</button>
          <button class="btn teal btn-dot">.</button>
          <button class="btn teal btn-eq">=</button>
        </div>
      </div>
    </section>
    <script src="assets/js/main.js"></script>
  </body>
</html>
